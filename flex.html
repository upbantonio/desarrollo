<!DOCTYPE html>

</head>
<body>

    <h2>display block</h2>
    <div class="caja">Caja1</div>
    <div class="caja">Caja2</div>
    <div class="caja">Caja3</div>

    <div class="caja1">Caja2</div>
    <div class="caja1">Caja3</div>

    <h2>display inline-block</h2>
    <div class="caja2">caja1</div>
    <div class="caja2">Caja2</div>

    <h2>flexbox</h2>
    <div class="contenedor">
        <div class="caja3 color1"  >caja1</div>
        <div class="caja3 color2" style="background-color: blue">Caja2</div>
        <div class="caja3 color3" style="background-color: red">Caja3</div>

    </div>
